<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Character History Browser</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <a class="skip-link" href="#members-panel">Skip to members</a>
  <div class="app-shell">
    <header class="topbar">
      <div class="toolbar">
        <div class="field field-server">
          <label for="server-select" class="field-label">Server</label>
          <select id="server-select" class="field-control field-select" aria-describedby="filter-help"></select>
        </div>
        <div class="field field-search">
          <label class="sr-only" for="filter">Search members</label>
          <input id="filter" class="field-control field-input" placeholder="Search names, clans, or servers" aria-describedby="filter-help" />
          <button id="clear-search" class="clear-search" type="button" aria-label="Clear search" hidden>✕</button>
        </div>
        <div id="filter-help" class="field-help">Search matches player names, clans, and server names within the selected server.</div>
      </div>
    </header>
    <main class="content-grid">
      <section class="panel clans-panel" id="clans-panel">
        <div class="panel-header">
          <h2 class="panel-title panel-title-clans">Clans</h2>
          <button class="panel-toggle" data-target="#clansCollapse" aria-expanded="true" aria-controls="clansCollapse"><span class="toggle-text">Hide</span></button>
        </div>
        <div id="clansCollapse" class="panel-collapse">
          <div id="clans" class="clan-cards"></div>
        </div>
      </section>
      <section class="panel members-panel" id="members-panel" aria-label="Members">
        <div class="panel-header">
          <h2 class="panel-title panel-title-members">Members</h2>
        </div>
        <div id="members" class="member-list" role="region" aria-live="polite"></div>
      </section>
    </main>
  </div>
  <div id="error-modal" class="modal-overlay hidden">
    <div class="modal-card modal-card-error">
      <div class="modal-header">
        <h2 class="modal-title modal-title-error">Error</h2>
        <button id="error-modal-close" class="modal-close modal-close-error" aria-label="Close error">✕</button>
      </div>
      <p id="error-modal-message" class="modal-message"></p>
      <button id="error-modal-reload" class="modal-action modal-action-error">Reload Page</button>
    </div>
  </div>
  <div id="copy-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="copy-modal-title">
    <div class="modal-card modal-card-copy">
      <div class="modal-header">
        <h2 id="copy-modal-title" class="modal-title modal-title-copy">Copy unavailable</h2>
        <button id="copy-modal-close" class="modal-close modal-close-copy" aria-label="Close copy popup">✕</button>
      </div>
      <p id="copy-modal-status" class="modal-message"></p>
      <textarea id="copy-modal-text" class="copy-textarea" readonly spellcheck="false"></textarea>
      <button id="copy-modal-copy" class="modal-action modal-action-copy" type="button">Copy</button>
    </div>
  </div>
  <script type="module" src="./assets/script.js"></script>
</body>
</html>
